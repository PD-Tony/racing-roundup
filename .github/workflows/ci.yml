name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: racing-roundup/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: racing-roundup

      - name: Lint
        run: npm run lint
        working-directory: racing-roundup

      - name: Build
        run: npm run build
        working-directory: racing-roundup
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: racing-roundup
